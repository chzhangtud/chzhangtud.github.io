<!-- start custom head snippets -->

<!-- insert favicons. use https://realfavicongenerator.net/ -->

<!-- Visit counter (busuanzi/vercount) styling -->
<style>
  .page__views {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5em;
    margin: 0 0 1.5em;
  }
  .page__views-item {
    display: inline-flex;
    align-items: center;
    gap: 0.4em;
    padding: 0.28em 0.75em;
    font-size: 0.8em;
    font-weight: 600;
    line-height: 1;
    color: #fff;
    border-radius: 999px;
    background: linear-gradient(135deg, #6a82fb 0%, #5b6ef5 50%, #8e54e9 100%);
    box-shadow: 0 2px 6px rgba(91, 110, 245, 0.3);
    white-space: nowrap;
  }
  .page__views-item i {
    font-size: 0.95em;
    opacity: 0.95;
  }
  .page__views-label {
    font-weight: 400;
    opacity: 0.9;
  }
</style>

<style>
  .ai-feedback__header { display: flex; align-items: center; justify-content: space-between; gap: 1em; }
  .ai-feedback .page__comments-title { margin: 0; }
  .ai-feedback__badge, .ai-feedback__type { padding: 0.2em 0.55em; border-radius: 999px; font-size: 0.72em; font-weight: 600; }
  .ai-feedback__badge { color: #6f56c8; background: rgba(142, 84, 233, 0.13); }
  .ai-feedback__type { color: #4f5fc7; background: rgba(91, 110, 245, 0.12); }
  .ai-feedback__summary { display: flex; gap: 1em; margin: 0.65em 0 1em; }
  .ai-feedback__metric i { margin-right: 0.1em; }
  .ai-feedback__avatar { display: grid; place-items: center; width: 48px; height: 48px; border-radius: 50%; background: #eef0ff; font-size: 1.35em; }
  .ai-feedback__comment .comment__content { margin-top: 0.65em; }
  .ai-feedback__comment .comment__content p { margin-bottom: 0.55em; }
  .ai-feedback__source { font-size: 0.85em; font-weight: 600; }
</style>

<!-- end custom head snippets -->

{% if page.layout == "single" and page.comments != false %}
<link rel="alternate" type="text/markdown" title="AI feedback protocol" href="{{ '/ai-feedback.md' | relative_url }}">
<meta name="ai-feedback" content="Read /ai-feedback.md when authenticated GitHub feedback is available.">
{% if site.ai_feedback.endpoint %}<meta name="ai-feedback-endpoint" content="{{ site.ai_feedback.endpoint }}/v1/ai-feedback">{% endif %}
{% endif %}
