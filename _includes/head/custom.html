<!-- Visit counter (busuanzi/vercount) styling -->
<style>
  .page__views {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5em;
    margin: 0 0 1.5em;
  }
  .page__views-item {
    display: inline-flex;
    align-items: center;
    gap: 0.4em;
    padding: 0.28em 0.75em;
    font-size: 0.8em;
    font-weight: 600;
    line-height: 1;
    color: #fff;
    border-radius: 999px;
    background: linear-gradient(135deg, #6a82fb 0%, #5b6ef5 50%, #8e54e9 100%);
    box-shadow: 0 2px 6px rgba(91, 110, 245, 0.3);
    white-space: nowrap;
  }
  .page__views-item i {
    font-size: 0.95em;
    opacity: 0.95;
  }
  .page__views-label {
    font-weight: 400;
    opacity: 0.9;
  }
</style>
